name: action-build

on:
  workflow_dispatch:
    inputs:
      build_configuration:
        description: 'Build configuration'
        required: true
        default: 'Debug'
        type: choice
        options:
          - Debug
          - Release

defaults:
  run:
    shell: pwsh

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@main
        with:
          fetch-depth: 0
          submodules: 'recursive'

      - name: Setup dotnet
        uses: actions/setup-dotnet@main
        with:
          dotnet-version: |
            6.x
            9.x

      - name: Build
        run: |
          dotnet build --configuration ${{ github.event.inputs.build_configuration }}

      - name: Create Artifact Directory
        run: |
          New-Item -ItemType Directory -Force -Path Artifact
          Copy-Item **/bin/${{ github.event.inputs.build_configuration }}/net6.0/* Artifact -ErrorAction SilentlyContinue
          Copy-Item LICENSE,README.md Artifact -ErrorAction SilentlyContinue

      - name: Create Zip Archive
        run: |
          Compress-Archive -Path Artifact/* -DestinationPath Plugin-${{ github.event.inputs.build_configuration }}.zip -Force

      - name: Upload Artifact
        uses: actions/upload-artifact@main
        with:
          name: Plugin-${{ github.event.inputs.build_configuration }}
          path: |
            Plugin-${{ github.event.inputs.build_configuration }}.zip